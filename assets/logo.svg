<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="agents-architect">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0B0B12"/>

  <!-- Architect's triangle / compass: the parent agent -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <!-- Outer ring (the blueprint) -->
    <circle r="176" fill="none" stroke="url(#g)" stroke-width="3" stroke-opacity="0.35"/>
    <circle r="144" fill="none" stroke="url(#g)" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="2 8"/>

    <!-- Parent triangle -->
    <polygon points="0,-128 111,64 -111,64" fill="none" stroke="url(#g)" stroke-width="6" stroke-linejoin="round"/>

    <!-- Child triangles spawning from each vertex (self-replication) -->
    <g stroke="url(#g)" stroke-width="3" fill="none" stroke-linejoin="round" opacity="0.95">
      <polygon points="0,-128 36,-64 -36,-64"/>
      <polygon points="111,64 147,128 75,128"/>
      <polygon points="-111,64 -75,128 -147,128"/>
    </g>

    <!-- Centroid node (orchestrator) -->
    <circle r="10" fill="url(#g)"/>
    <!-- Connector lines from orchestrator to children -->
    <g stroke="url(#g)" stroke-width="1.5" stroke-opacity="0.7">
      <line x1="0" y1="0" x2="0" y2="-96"/>
      <line x1="0" y1="0" x2="111" y2="96"/>
      <line x1="0" y1="0" x2="-111" y2="96"/>
    </g>

    <!-- Spawn dots at each child -->
    <g fill="url(#g)">
      <circle cx="0" cy="-96" r="5"/>
      <circle cx="111" cy="96" r="5"/>
      <circle cx="-111" cy="96" r="5"/>
    </g>
  </g>

  <!-- Wordmark (optional, small) -->
  <text x="256" y="476" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" font-weight="600" fill="#E5E7EB" letter-spacing="2">agents-architect</text>
</svg>
