name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run validator
        run: python3 scripts/validate.py .
      - name: Parse all JSON manifests
        run: |
          set -e
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            echo "checking $f"
            python3 -c "import json,sys; json.load(open('$f'))"
          done
      - name: Lint SKILL.md frontmatter
        run: |
          python3 - <<'PY'
          import pathlib, re, sys
          fail = 0
          for p in pathlib.Path("skills").glob("*/SKILL.md"):
              t = p.read_text()
              if not t.startswith("---"):
                  print(f"::error file={p}::missing frontmatter"); fail = 1
                  continue
              fm = t.split("---", 2)[1]
              if "description:" not in fm:
                  print(f"::error file={p}::missing description"); fail = 1
          sys.exit(fail)
          PY
